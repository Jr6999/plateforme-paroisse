name: Deploy to Koyeb

on:
  push:
    branches: ["main"]

jobs:
  # ── Job 1 : CI (build + test) ───────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parish_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parish_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-change-me-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-32chars
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build all packages
        run: npm run build

      - name: Run API tests
        run: npm run test --workspace apps/api

  # ── Job 2 : Deploy API sur Koyeb ───────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API to Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          api-token: ${{ secrets.KOYEB_API_TOKEN }}
          app-name: paroisse-api
          service-name: paroisse-api
          git-repository: github.com/Jr6999/plateforme-paroisse
          git-branch: main
          docker-dockerfile: apps/api/Dockerfile
          service-ports: "4000:http"
          service-routes: "/:4000"
          service-env: |
            NODE_ENV=production
            PORT=4000
          service-secrets: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            WEB_URL=${{ secrets.WEB_URL }}
            API_URL=${{ secrets.API_URL }}

  # ── Job 3 : Deploy Web sur Koyeb ───────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Web to Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          api-token: ${{ secrets.KOYEB_API_TOKEN }}
          app-name: paroisse-web
          service-name: paroisse-web
          git-repository: github.com/Jr6999/plateforme-paroisse
          git-branch: main
          docker-dockerfile: apps/web/Dockerfile
          docker-build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}/api
            NEXT_PUBLIC_SITE_URL=${{ secrets.WEB_URL }}
          service-ports: "3000:http"
          service-routes: "/:3000"
          service-env: |
            NODE_ENV=production
            PORT=3000
            HOSTNAME=0.0.0.0
