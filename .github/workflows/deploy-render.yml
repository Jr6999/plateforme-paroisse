name: Deploy to Render

on:
  push:
    branches: ["main"]

jobs:
  # ── CI : build + test ──────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parish_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parish_platform?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-change-me-32chars!!
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-32chars!
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: TypeScript check
        run: npm run lint --workspace apps/api

      - name: Build API
        run: npm run build --workspace apps/api

      - name: Build Web
        run: npm run build --workspace apps/web

      - name: Run API tests
        run: npm run test --workspace apps/api

  # ── Deploy API sur Render ──────────────────────────────────────
  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — API
        run: |
          curl -s -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_API_SERVICE_ID }}/deploys" \
            -d '{}'

  # ── Deploy Web sur Render ──────────────────────────────────────
  deploy-web:
    name: Deploy Web (Render)
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy — Web
        run: |
          curl -s -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_WEB_SERVICE_ID }}/deploys" \
            -d '{}'
