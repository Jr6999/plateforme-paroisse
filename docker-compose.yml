services:
  postgres:
    image: postgres:16-alpine
    container_name: paroisse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parish_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parish_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: paroisse_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/parish_platform?schema=public
      WEB_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://api:4000/api
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    container_name: paroisse_web
    restart: unless-stopped
    environment:
      API_URL: http://api:4000/api
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
