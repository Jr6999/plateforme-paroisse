# ═══════════════════════════════════════════════════════════════
#  Cathédrale Saint Sauveur de Natitingou
#  Configuration Render — Infrastructure as Code
#  Monorepo npm workspaces : apps/api (Express) + apps/web (Next.js)
# ═══════════════════════════════════════════════════════════════
#
#  IMPORTANT — Configuration du dashboard Render :
#  ─────────────────────────────────────────────────────────────
#  Service API :
#    Build Command : npm ci && npm run build:api
#    Start Command : npm run prisma:migrate && npm start
#    Root Directory : (laisser VIDE — Render exécute depuis la racine)
#
#  Service Web :
#    Build Command : npm ci && npm run build:web
#    Start Command : npm run start:web
#    Root Directory : (laisser VIDE)
#
#  Documentation : https://render.com/docs/blueprint-spec

services:
  # ── Service API (Backend Express + Prisma) ─────────────────────
  - type: web
    name: cathedrale-api
    runtime: node
    region: frankfurt
    plan: free

    # Root directory VIDE = Render exécute depuis la racine du monorepo
    # Les scripts racine délèguent aux workspaces via --workspace apps/api
    buildCommand: "npm ci && npm run build:api"
    startCommand: "npm run prisma:migrate && npm start"

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      # Render injecte PORT automatiquement — ne pas fixer à 4000 ici
      # Le serveur lit process.env.PORT || 4000
      - key: DATABASE_URL
        fromDatabase:
          name: cathedrale-postgres
          property: connectionString
      # Secrets à définir dans Dashboard → Service → Environment
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: "Cathédrale Saint Sauveur <noreply@cathedrale-natitingou.org>"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"

  # ── Service Web (Frontend Next.js) ─────────────────────────────
  - type: web
    name: cathedrale-web
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: "npm ci && npm run build:web"
    startCommand: "npm run start:web"

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

# ── Base de données PostgreSQL ────────────────────────────────────
databases:
  - name: cathedrale-postgres
    region: frankfurt
    plan: free
    databaseName: parish_platform
    ipAllowList: []
