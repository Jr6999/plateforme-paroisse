# Configuration Netlify — Cathédrale Saint Sauveur de Natitingou
# Frontend Next.js uniquement (apps/web)
# L'API Express doit être hébergée séparément (Render / Railway / Koyeb)

[build]
  base    = "."
  command = "npm ci && npm run build --workspace apps/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION        = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # Remplacer par l'URL réelle de votre API backend déployée
  NEXT_PUBLIC_API_URL  = "https://your-api.onrender.com/api"
  NEXT_PUBLIC_SITE_URL = "https://cathedrale-natitingou.netlify.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirections pour Next.js App Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self)"

# Cache des assets statiques
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
