# ═══════════════════════════════════════════════════════════════
#  Cathédrale Saint Sauveur de Natitingou
#  Configuration Koyeb — Deux services Docker
#  Dépôt : https://github.com/Jr6999/plateforme-paroisse
# ═══════════════════════════════════════════════════════════════

services:
  # ── Service API (Backend Express + Prisma) ──────────────────────
  - name: cathedrale-api
    type: web
    git:
      repository: github.com/Jr6999/plateforme-paroisse
      branch: main
    build:
      dockerfile: apps/api/Dockerfile
      context: .
    ports:
      - port: 4000
        protocol: http
    health_checks:
      - path: /health
        port: 4000
        protocol: http
        initial_delay_seconds: 40
        period_seconds: 30
        timeout_seconds: 10
        failure_threshold: 3
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # ⚠️  Secrets à définir dans le dashboard Koyeb :
      # DATABASE_URL, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET,
      # COOKIE_SECRET, CORS_ORIGINS, WEB_URL, API_URL,
      # CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET,
      # SMTP_HOST, SMTP_USER, SMTP_PASS
    scaling:
      min: 1
      max: 1

  # ── Service Web (Frontend Next.js Standalone) ───────────────────
  - name: cathedrale-web
    type: web
    git:
      repository: github.com/Jr6999/plateforme-paroisse
      branch: main
    build:
      dockerfile: apps/web/Dockerfile
      context: .
      args:
        # ⚠️  Remplacer par l'URL publique du service API Koyeb
        NEXT_PUBLIC_API_URL: https://cathedrale-api-XXXX.koyeb.app/api
        NEXT_PUBLIC_SITE_URL: https://cathedrale-web-XXXX.koyeb.app
    ports:
      - port: 3000
        protocol: http
    health_checks:
      - path: /
        port: 3000
        protocol: http
        initial_delay_seconds: 40
        period_seconds: 30
        timeout_seconds: 10
        failure_threshold: 3
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    scaling:
      min: 1
      max: 1
